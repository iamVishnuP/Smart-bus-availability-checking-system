<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>

    <!-- Neon Glow Blue -->
    <linearGradient id="neonBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>

    <!-- Glowing Shadows -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Premium Rounded Icon Base -->
  <rect x="0" y="0" width="512" height="512" rx="110" fill="url(#bgGrad)" stroke="#38bdf8" stroke-width="4" />

  <!-- Outer Neon Circular Glow Backdrop -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#2563eb" stroke-width="2" stroke-dasharray="10 15" opacity="0.3" />

  <!-- Futuristic 3D Front Bus Silhouette -->
  <g filter="url(#glow)">
    <!-- Bus Roof & Body Outline -->
    <path d="M156 120 C156 100, 356 100, 356 120 L376 340 C376 360, 356 380, 336 380 L176 380 C156 380, 136 360, 136 340 Z" fill="url(#neonBlue)" opacity="0.95" />

    <!-- Windshield -->
    <path d="M166 140 C166 130, 346 130, 346 140 L356 220 H156 Z" fill="#0f172a" stroke="#38bdf8" stroke-width="3" />

    <!-- High-tech Destination LED Board -->
    <rect x="196" y="148" width="120" height="24" rx="6" fill="#020617" stroke="#38bdf8" stroke-width="1.5" />
    <text x="256" y="164" fill="#38bdf8" font-family="monospace, sans-serif" font-weight="900" font-size="12" text-anchor="middle" letter-spacing="1">KERALA TRANSIT</text>

    <!-- Grill & Lower Bumper -->
    <rect x="176" y="290" width="160" height="50" rx="10" fill="#0f172a" stroke="#2563eb" stroke-width="3" />
    <!-- Grill lines -->
    <line x1="206" y1="315" x2="306" y2="315" stroke="#38bdf8" stroke-width="4" stroke-dasharray="8 6" />

    <!-- Glowing LED Headlights -->
    <circle cx="176" cy="260" r="16" fill="#fff" filter="url(#glow)" stroke="#38bdf8" stroke-width="2" />
    <circle cx="336" cy="260" r="16" fill="#fff" filter="url(#glow)" stroke="#38bdf8" stroke-width="2" />

    <!-- Bumper Lights / Neon Bars -->
    <rect x="186" y="350" width="30" height="12" rx="4" fill="#38bdf8" />
    <rect x="296" y="350" width="30" height="12" rx="4" fill="#38bdf8" />

    <!-- Wheels (Bottom Base Shadows) -->
    <rect x="126" y="370" width="40" height="24" rx="6" fill="#020617" />
    <rect x="346" y="370" width="40" height="24" rx="6" fill="#020617" />
  </g>

  <!-- Glowing Connection Pulse -->
  <circle cx="256" cy="70" r="10" fill="#22c55e" filter="url(#glow)" />
  <circle cx="256" cy="70" r="22" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.5" filter="url(#glow)">
    <animate attributeName="r" values="10;30;10" dur="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.8;0;0.8" dur="2s" repeatCount="indefinite" />
  </circle>
</svg>
